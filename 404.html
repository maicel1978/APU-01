<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Página no encontrada — APU</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef4f7;
      --surface: #ffffff;
      --text: #172126;
      --muted: #5b6b73;
      --primary: #0f6f78;
      --border: #d5e1e6;
      --radius: 20px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --border: #334155;
      }
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      padding: 2rem;
    }
    .container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      max-width: 440px;
      width: 100%;
      padding: 3rem 2.5rem;
      text-align: center;
    }
    .icon {
      font-size: 3.5rem;
      margin-bottom: 1rem;
      display: block;
    }
    h1 {
      font-size: 1.75rem;
      margin: 0 0 0.5rem;
      font-weight: 800;
    }
    .error-code {
      display: inline-block;
      background: var(--bg);
      color: var(--muted);
      font-size: 0.875rem;
      font-weight: 700;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }
    p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--primary);
      color: white;
      text-decoration: none;
      padding: 0.875rem 2rem;
      border-radius: 999px;
      font-weight: 700;
      transition: all 0.2s ease;
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(15,111,120,0.25);
    }
    .footer {
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="container" role="main">
    <span class="icon" aria-hidden="true">🔬</span>
    <h1>Página no encontrada</h1>
    <span class="error-code">Error 404</span>
    
    <p>
      La página que buscas no existe o ha sido movida.<br>
      Todos tus datos permanecen seguros en tu dispositivo.
    </p>
    
    <a href="/" class="btn">← Volver al inicio</a>
    
    <div class="footer">
      APU Ecosystem • Privacidad por defecto • Procesamiento local
    </div>
  </div>
</body>
</html>
